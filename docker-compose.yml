# Infra locale Riku — bases de données uniquement (tâche 2.1).
# api/web tournent sur l'hôte en dev (pnpm start:dev / pnpm dev) : les conteneuriser
# ferait perdre le hot-reload sans rien apporter. Leurs images arrivent en 6.1.
#
# Démarrer : docker compose up -d     Arrêter : docker compose down
# Repartir de zéro (efface les données) : docker compose down -v

services:
  mysql:
    # docker.r2 — tag épinglé sur une LTS, jamais `latest`.
    image: mysql:8.4
    container_name: riku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Lié à la loopback : la base reste joignable depuis l'hôte (client SQL,
      # migrations TypeORM) mais n'est pas exposée au réseau local.
      - '127.0.0.1:${MYSQL_PORT}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Un port ouvert ≠ un serveur prêt : MySQL accepte les connexions TCP bien
      # avant d'avoir fini son initialisation. L'API doit attendre ce ping.
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:8.0
    container_name: riku-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - '127.0.0.1:${MONGO_PORT}:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
  mongo_data:
